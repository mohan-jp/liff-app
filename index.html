<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line LIFF App</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    // LIFF SDK Detection and Fallback
    window.liffReady = false;
    
    console.log('=== index.html LIFF Detection Started ===');
    console.log('URL:', window.location.href);
    console.log('User Agent:', navigator.userAgent);
    console.log('window.liff on page load:', typeof window.liff);
    
    // Method 1: Wait for LINE's automatic SDK injection (happens when opened via LIFF URL in LINE)
    window.addEventListener('liff.ready', () => {
      console.log('✓ LIFF ready event fired');
      window.liffReady = true;
    });
    
    // Method 2: Poll for window.liff availability
    let liffCheckCount = 0;
    const liffPollInterval = setInterval(() => {
      liffCheckCount++;
      if (typeof window.liff !== 'undefined') {
        console.log('✓ window.liff found after ' + liffCheckCount + ' checks');
        window.liffReady = true;
        clearInterval(liffPollInterval);
      } else if (liffCheckCount > 50) {
        console.warn('✗ window.liff not found after 50 checks (5 seconds)');
        clearInterval(liffPollInterval);
      }
    }, 100);
    
    // Method 3: Fallback - load SDK if not injected by LINE
    setTimeout(() => {
      if (typeof window.liff === 'undefined') {
        console.warn('LIFF SDK not injected by LINE - attempting manual load');
        const script = document.createElement('script');
        script.src = 'https://static.line-scdn.net/liff/edge/2/sdk.js';
        script.onload = () => {
          console.log('✓ LIFF SDK loaded via fallback');
          window.liffReady = true;
        };
        script.onerror = () => {
          console.error('✗ Failed to load LIFF SDK');
        };
        document.head.appendChild(script);
      }
    }, 3000);
    
    console.log('=== index.html LIFF Detection Ready ===');
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body, #root {
      width: 100%;
      height: 100%;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
